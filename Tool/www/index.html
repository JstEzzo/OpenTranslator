<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenTranslator</title>
    <link rel="icon" type="image/png" href="OpenTranslator.png">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="shortcut icon" type="image/png" href="OpenTranslator.png">
    <link rel="apple-touch-icon" href="OpenTranslator.png">
    <style>
        /* Minimal loading state — prevents FOUC (Flash of Unstyled Content) */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; background: #1a1b1e; color: #c1c2c5; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        #root {
            display: flex; align-items: center; justify-content: center;
            height: 100vh; width: 100vw;
            font-size: 16px; color: #5c5f66;
            flex-direction: column; gap: 16px;
        }
        .spinner {
            width: 32px; height: 32px;
            border: 3px solid #2c2e33; border-top-color: #4c9aff;
            border-radius: 50%; animation: spin .8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #app {
            width: 100% !important;
            height: 100% !important;
        }
    </style>
</head>
<body>
<div id="root"><div class="spinner"></div><span>Carregando OpenTranslator...</span></div>
<script src="app.js"></script>
</body>
</html>
